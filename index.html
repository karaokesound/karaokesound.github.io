<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeBuddy - Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #1a1a2e;
            background-image: radial-gradient(ellipse at top, #2d1b3d 0%, #1a1a2e 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Lato', sans-serif;
            color: #f0e6d3;
        }

        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 500px;
        }

        .emoji {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #f0e6d3;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 14px;
            font-weight: 300;
            color: #b8956a;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
        }

        .card p {
            font-size: 15px;
            font-weight: 300;
            color: #c9b99a;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .card a {
            display: inline-block;
            background: #b8956a;
            color: #1a1a2e;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .card a:hover {
            background: #d4aa7d;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">🎂</span>
        <h1>BakeBuddy</h1>
        <p class="tagline">Support</p>
        <div class="card">
            <p>Masz pytanie lub napotkałeś problem?<br>Napisz do nas — postaramy się pomóc.</p>
            <a href="mailto:twoj@email.com">service.bakebuddy@gmail.com</a>
        </div>
    </div>
</body>
</html>
