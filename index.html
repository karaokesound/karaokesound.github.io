<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeBuddy - Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #9B6C72;
            background-image: radial-gradient(ellipse at top, #b8838a 0%, #9B6C72 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Lato', sans-serif;
            color: #FDFCF9;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 500px;
        }
        .emoji {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #FDFCF9;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .tagline {
            font-size: 14px;
            font-weight: 300;
            color: rgba(253,252,249,0.6);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }
        .card {
            background: rgba(253,252,249,0.15);
            border: 1px solid rgba(253,252,249,0.25);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 12px;
        }
        .card p {
            font-size: 15px;
            font-weight: 300;
            color: rgba(253,252,249,0.85);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .card a.btn {
            display: inline-block;
            background: #FDFCF9;
            color: #9B6C72;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .card a.btn:hover {
            background: rgba(253,252,249,0.85);
        }
        .card a.btn-outline {
            display: inline-block;
            background: transparent;
            color: rgba(253,252,249,0.8);
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 1px;
            border: 1px solid rgba(253,252,249,0.3);
            transition: border-color 0.2s, color 0.2s;
        }
        .card a.btn-outline:hover {
            border-color: rgba(253,252,249,0.7);
            color: #FDFCF9;
        }
        .footer-links {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 24px;
        }
        .footer-links a {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(253,252,249,0.4);
            text-decoration: none;
            border-bottom: 1px solid rgba(253,252,249,0.2);
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
        }
        .footer-links a:hover {
            color: rgba(253,252,249,0.7);
            border-color: rgba(253,252,249,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="emoji">🎂</span>
        <h1>BakeBuddy</h1>
        <p class="tagline">Support</p>

        <div class="card">
            <p>Masz pytanie lub napotkałeś problem?<br>Napisz do nas — postaramy się pomóc.</p>
            <a href="mailto:service.bakebuddy@gmail.com" class="btn">service.bakebuddy@gmail.com</a>
        </div>

        <div class="card">
            <p>Chcesz usunąć swoje konto<br>i powiązane dane?</p>
            <a href="/delete-account" class="btn-outline">Usuń konto</a>
        </div>

        <div class="footer-links">
            <a href="/privacy">Polityka Prywatności</a>
        </div>
    </div>
</body>
</html>
